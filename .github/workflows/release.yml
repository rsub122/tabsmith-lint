name: Release

# Publishes to npm automatically when a version tag (vX.Y.Z) is pushed.
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret to manage.
# One-time setup on npmjs.com: package → Settings → Trusted Publisher →
# GitHub Actions, repo rsub122/tabsmith-lint, workflow release.yml.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # create the GitHub Release
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # trusted publishing/OIDC needs a recent npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Guard: the tag must match the version in package.json, so you can't
      # accidentally publish a mismatched version.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"; exit 1
          fi
      - run: npm publish --provenance --access public
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "$GITHUB_REF_NAME" --generate-notes
